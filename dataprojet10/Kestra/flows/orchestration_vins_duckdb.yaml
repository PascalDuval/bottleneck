        retry:
          type: constant
          interval: PT5S
          maxAttempt: 4
        beforeCommands:
          - pip install pandas==1.5.3 numpy==1.24.4 pytest
        inputFiles:
          final.csv: "{{ outputs.merge_final.outputFiles['data/final.csv'] }}"
        script: |
          import os
          import subprocess
          from pathlib import Path
          import pandas as pd

          Path("data").mkdir(parents=True, exist_ok=True)
          os.rename("final.csv", "data/final.csv")

          df = pd.read_csv("data/final.csv")
          print("=== DEBUG FINAL ===")
          print("Rows:", len(df))
          print("Columns:", list(df.columns))
          print(df.head().to_string())

          lines = [
              "import pandas as pd",
              "",
              "def test_not_empty():",
              "    df = pd.read_csv('data/final.csv')",
              "    assert len(df) > 0",
              "",
              "def test_has_product_id():",
              "    df = pd.read_csv('data/final.csv')",
              "    assert 'product_id' in df.columns",
              "",
              "def test_no_null_product_id():",
              "    df = pd.read_csv('data/final.csv')",
              "    assert df['product_id'].notna().all()",
          ]

          with open("test_data.py", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          result = subprocess.run(["pytest", "-v", "test_data.py"], capture_output=True, text=True)

          print("=== PYTEST DATA STDOUT ===")
          print(result.stdout)
          print("=== PYTEST DATA STDERR ===")
          print(result.stderr)

          if result.returncode != 0:
              raise Exception("pytest_data failed")

      - id: pytest_business
        type: io.kestra.plugin.scripts.python.Script
        containerImage: python:3.11-slim
        retry:
          type: constant
          interval: PT5S
          maxAttempt: 4
        beforeCommands:
          - pip install pandas==1.5.3 numpy==1.24.4 pytest
        inputFiles:
          ca.csv: "{{ outputs.compute_ca.outputFiles['data/ca.csv'] }}"
        script: |
          import os
          import subprocess
          from pathlib import Path
          import pandas as pd

          Path("data").mkdir(parents=True, exist_ok=True)
          os.rename("ca.csv", "data/ca.csv")

          df = pd.read_csv("data/ca.csv")
          print("=== DEBUG CA ===")
          print("Rows:", len(df))
          print("Columns:", list(df.columns))
          print(df.head().to_string())

          lines = [
              "import pandas as pd",
              "",
              "def test_ca_exists():",
              "    df = pd.read_csv('data/ca.csv')",
              "    assert 'ca' in df.columns",
              "",
              "def test_ca_non_negative():",
              "    df = pd.read_csv('data/ca.csv')",
              "    assert (df['ca'] >= 0).all()",
          ]

          with open("test_business.py", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          result = subprocess.run(["pytest", "-v", "test_business.py"], capture_output=True, text=True)

          print("=== PYTEST BUSINESS STDOUT ===")
          print(result.stdout)
          print("=== PYTEST BUSINESS STDERR ===")
          print(result.stderr)

          if result.returncode != 0:
              raise Exception("pytest_business failed")

  # ============================================================
  # PHASE 5 — DASHBOARD / RÉCAP
  # ============================================================
  - id: summary_dashboard
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    retry:
      type: constant
      interval: PT5S
      maxAttempt: 4
    beforeCommands:
      - pip install pandas==1.5.3 numpy==1.24.4
    inputFiles:
      erp.json: "{{ outputs.clean_erp.outputFiles['audit/erp_metrics.json'] }}"
      web.json: "{{ outputs.clean_web.outputFiles['audit/web_metrics.json'] }}"
      liaison.json: "{{ outputs.clean_liaison.outputFiles['audit/liaison_metrics.json'] }}"
      final.json: "{{ outputs.merge_final.outputFiles['audit/final_metrics.json'] }}"
      ca.json: "{{ outputs.compute_ca.outputFiles['audit/ca_metrics.json'] }}"
      zscore.json: "{{ outputs.zscore_segmentation.outputFiles['audit/zscore_metrics.json'] }}"
    outputFiles:
      - metrics/dashboard_metrics.csv
      - metrics/final_summary.json
    script: |
      import json
      from pathlib import Path
      import pandas as pd

      Path("metrics").mkdir(parents=True, exist_ok=True)

      erp = json.load(open("erp.json", encoding="utf-8"))
      web = json.load(open("web.json", encoding="utf-8"))
      liaison = json.load(open("liaison.json", encoding="utf-8"))
      final = json.load(open("final.json", encoding="utf-8"))
      ca = json.load(open("ca.json", encoding="utf-8"))
      z = json.load(open("zscore.json", encoding="utf-8"))

      dashboard = pd.DataFrame([
          {"metric": "erp_after_dedup", "expected": 825, "actual": erp["clean_rows"]},
          {"metric": "liaison_after_dedup", "expected": 825, "actual": liaison["clean_rows"]},
          {"metric": "web_after_cleaning", "expected": 1428, "actual": web["products_rows_after_filter"]},
          {"metric": "web_after_dedup", "expected": 714, "actual": web["clean_rows_after_dedup"]},
          {"metric": "merged_rows", "expected": 714, "actual": final["rows_final"]},
          {"metric": "ca_total", "expected": 70568.60, "actual": ca["ca_total"]},
          {"metric": "premium_count", "expected": 30, "actual": z["premium_count"]}
      ])

      dashboard.to_csv("metrics/dashboard_metrics.csv", index=False)

      summary = {
          "comparison": dashboard.to_dict(orient="records"),
          "actual": {
              "erp_after_dedup": erp["clean_rows"],
              "liaison_after_dedup": liaison["clean_rows"],
              "web_after_cleaning": web["products_rows_after_filter"],
              "web_after_dedup": web["clean_rows_after_dedup"],
              "merged_rows": final["rows_final"],
              "ca_total": ca["ca_total"],
              "premium_count": z["premium_count"]
          }
      }

      with open("metrics/final_summary.json", "w", encoding="utf-8") as f:
          json.dump(summary, f, indent=2, ensure_ascii=False)

      print("")
      print("===== RÉCAPITULATIF FINAL =====")
      print("")
      print("Après dédoublonnage du fichier erp :", erp["clean_rows"], "lignes")
      print("Après dédoublonnage du fichier liaison :", liaison["clean_rows"], "lignes")
      print("Après nettoyage du fichier web :", web["products_rows_after_filter"], "lignes")
      print("Après dédoublonnage du fichier web :", web["clean_rows_after_dedup"], "lignes")
      print("Fichier fusionné :", final["rows_final"], "lignes")
      print("Le chiffre d'affaires total réalisé est de", ca["ca_total"], "euros")
      print("Nombre de vins millésimes détectés :", z["premium_count"])
      print("")
      print("===== COMPARAISON AVEC LES VALEURS ATTENDUES =====")
      print(dashboard.to_string(index=False))

  # ============================================================
  # PHASE 6 — EXPORTS FINAUX
  # ============================================================
  - id: export_outputs
    type: io.kestra.plugin.scripts.python.Script
    containerImage: python:3.11-slim
    retry:
      type: constant
      interval: PT5S
      maxAttempt: 4
    beforeCommands:
      - pip install pandas==1.5.3 numpy==1.24.4 openpyxl
    inputFiles:
      final.csv: "{{ outputs.merge_final.outputFiles['data/final.csv'] }}"
      ca.csv: "{{ outputs.compute_ca.outputFiles['data/ca.csv'] }}"
      premium.csv: "{{ outputs.zscore_segmentation.outputFiles['data/vins_premium.csv'] }}"
      ordinary.csv: "{{ outputs.zscore_segmentation.outputFiles['data/vins_ordinaires.csv'] }}"
      dashboard.csv: "{{ outputs.summary_dashboard.outputFiles['metrics/dashboard_metrics.csv'] }}"
      summary.json: "{{ outputs.summary_dashboard.outputFiles['metrics/final_summary.json'] }}"
    outputFiles:
      - outputs/consolidation.xlsx
      - outputs/ca_par_produit.csv
      - outputs/vins_premium.csv
      - outputs/vins_ordinaires.csv
      - outputs/dashboard_metrics.csv
      - outputs/final_summary.json
    script: |
      import shutil
      from pathlib import Path
      import pandas as pd

      Path("outputs").mkdir(parents=True, exist_ok=True)

      final = pd.read_csv("final.csv")
      final.to_excel("outputs/consolidation.xlsx", index=False)

      shutil.copy("ca.csv", "outputs/ca_par_produit.csv")
      shutil.copy("premium.csv", "outputs/vins_premium.csv")
      shutil.copy("ordinary.csv", "outputs/vins_ordinaires.csv")
      shutil.copy("dashboard.csv", "outputs/dashboard_metrics.csv")
      shutil.copy("summary.json", "outputs/final_summary.json")

      print("✅ Fichiers finaux exportés dans outputs/")

  - id: end
    type: io.kestra.plugin.core.log.Log
    message: |
