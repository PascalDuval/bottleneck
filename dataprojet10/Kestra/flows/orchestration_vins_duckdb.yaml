      - outputs/vins_ordinaires.csv
      - outputs/dashboard_metrics.csv
      - outputs/final_summary.json

      Résultats visibles dans :
      - tests_quality
      - test_join_coherence
      - test_ca_coherence
      - test_zscore_prix
      - summary_dashboard